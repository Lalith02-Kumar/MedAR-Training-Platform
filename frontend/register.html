<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MedAR Trainer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(16, 185, 129, 0.25), transparent 70%), #000000 !important;
            overflow-x: hidden;
            position: relative;
        }

        /* 1) Subtle Medical Grid */
        .medical-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: 50px 50px;
            background-image:
                linear-gradient(to right, rgba(16, 185, 129, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(16, 185, 129, 0.03) 1px, transparent 1px);
            z-index: -2;
            pointer-events: none;
        }

        /* 2) Depth Lighting / Radial AR Glow */
        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 60%);
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }

        /* AR Particles Mockup (Static dots for high-tech feel) */
        .ar-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: radial-gradient(rgba(16, 185, 129, 0.2) 1px, transparent 1px);
            background-size: 15px 15px;
            opacity: 0.2;
            z-index: -1;
            pointer-events: none;
        }

        .auth-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 100px);
            position: relative;
        }

        /* Glassmorphism Card & Hover Depth */
        .auth-container {
            max-width: 680px;
            width: 100%;
            padding: 65px 70px;
            z-index: 10;
            background: rgba(17, 33, 23, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.4s ease;
        }

        .auth-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(16, 185, 129, 0.2);
        }

        /* Top Edge Highlight on Card */
        .auth-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
            transition: background 0.4s ease;
        }

        .auth-container[data-role="instructor"] {
            border-top: 1px solid rgba(59, 130, 246, 0.2);
        }

        .auth-container[data-role="instructor"]::after {
            background: linear-gradient(90deg, transparent, #3b82f6, transparent);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
        }

        .auth-header h2 {
            color: #ffffff;
            font-size: 2.2rem;
            margin-bottom: 5px;
            font-weight: 800;
        }

        .error-msg {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: none;
            text-align: center;
            border: 1px solid rgba(239, 68, 68, 0.2);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Input Styling */
        .form-control {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(16, 185, 129, 0.05);
            border-color: rgba(16, 185, 129, 0.4);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .auth-container[data-role="instructor"] .form-control:focus {
            background: rgba(59, 130, 246, 0.05);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Stronger Gradient Button */
        #btn-submit {
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            border: none;
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        #btn-submit:hover {
            box-shadow: 0 12px 30px rgba(16, 185, 129, 0.4);
            transform: translateY(-2px);
            background: linear-gradient(135deg, #059669 0%, #065f46 100%);
        }

        /* Dynamic Button Role Overrides */
        #btn-submit[data-role="instructor"] {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
        }

        #btn-submit[data-role="instructor"]:hover {
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.4);
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
        }

        .role-pill-group {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 6px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            position: relative;
            z-index: 2;
        }

        .role-pill {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .role-pill.active[data-target="student"] {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
        }

        .role-pill.active[data-target="instructor"] {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>

<body>
    <div class="medical-grid"></div>
    <div class="ar-particles"></div>


    <nav class="navbar" style="padding: 20px 0; border: none; background: transparent;">
        <div class="container d-flex justify-between align-center">
            <a href="index.html" class="nav-brand" style="color: #fff;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
                </svg>
                MedAR
            </a>
            <div class="nav-links">
                <a href="login.html" class="btn btn-outline" style="padding: 8px 24px;">Login</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="auth-wrapper">
            <div id="auth-box" class="auth-container" data-role="student">
                <div class="auth-header">
                    <h2>Join MedAR</h2>
                    <p class="text-secondary" style="font-size: 0.95rem;">Begin your surgical training journey</p>
                </div>

                <div id="error-box" class="error-msg"></div>

                <form id="register-form" style="position: relative; z-index: 2;">
                    <!-- Hidden Select to preserve backend workflow -->
                    <select id="role" style="display: none;" required>
                        <option value="student" selected>Medical Student</option>
                        <option value="instructor">Instructor</option>
                    </select>

                    <div class="role-pill-group">
                        <div class="role-pill active" data-target="student">🎓 Student</div>
                        <div class="role-pill" data-target="instructor">👨‍🏫 Instructor</div>
                    </div>

                    <div class="form-group" style="margin-bottom: 22px;">
                        <label for="name"
                            style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; color: var(--text-secondary);">Full
                            Name</label>
                        <div class="auth-input-wrapper">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <input type="text" id="name" class="form-control" required placeholder="Dr. John Doe">
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 22px;">
                        <label for="email"
                            style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; color: var(--text-secondary);">Email
                            Address</label>
                        <div class="auth-input-wrapper">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                                </path>
                                <polyline points="22,6 12,13 2,6"></polyline>
                            </svg>
                            <input type="email" id="email" class="form-control" required placeholder="doctor@medar.com">
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 30px;">
                        <label for="password"
                            style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; color: var(--text-secondary);">Password</label>
                        <div class="auth-input-wrapper">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input type="password" id="password" class="form-control" required placeholder="••••••••">
                        </div>
                    </div>

                    <button id="btn-submit" type="submit" class="btn btn-primary" data-role="student"
                        style="width: 100%; padding: 16px; font-size: 1.05rem; border-radius: 12px;">
                        <span>Create Account</span>
                    </button>
                </form>

                <p class="text-center mt-4" style="position: relative; z-index: 2;">
                    <span class="text-secondary" style="font-size: 0.95rem;">Already have an account?</span>
                    <a href="login.html"
                        style="color: var(--primary); text-decoration: none; font-weight: 600; margin-left: 5px;">Login</a>
                </p>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Init theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // Role Selector Logic
        const hiddenRoleSelect = document.getElementById('role');
        const rolePills = document.querySelectorAll('.role-pill');
        const authBox = document.getElementById('auth-box');
        const btnSubmit = document.getElementById('btn-submit');

        rolePills.forEach(pill => {
            pill.addEventListener('click', () => {
                // Update visuals
                rolePills.forEach(p => p.classList.remove('active'));
                pill.classList.add('active');

                // Update hidden select to preserve exact logic
                const selectedRole = pill.getAttribute('data-target');
                hiddenRoleSelect.value = selectedRole;

                // Update container styles for styling feedback
                authBox.setAttribute('data-role', selectedRole);
                btnSubmit.setAttribute('data-role', selectedRole);
            });
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value; // Grabbing from hidden select!
            const errorBox = document.getElementById('error-box');

            try {
                // UI Loading state
                const originalText = btnSubmit.innerHTML;
                btnSubmit.innerHTML = `<svg class="animate-spin" style="margin-right: 8px; width: 18px; height: 18px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Creating Account...`;
                btnSubmit.disabled = true;

                const user = await Auth.register(name, email, password, role);

                // Redirect based on role
                if (user.role === 'student') window.location.href = 'student-dashboard.html';
                else if (user.role === 'instructor') window.location.href = 'instructor-dashboard.html';
                else if (user.role === 'admin') window.location.href = 'admin-dashboard.html';

            } catch (error) {
                // Reset UI
                btnSubmit.innerHTML = `<span>Create Account</span>`;
                btnSubmit.disabled = false;

                errorBox.textContent = error.message;
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>

</html>
